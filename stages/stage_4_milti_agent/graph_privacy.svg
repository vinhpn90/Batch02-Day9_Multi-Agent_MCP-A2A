<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Stage 4 Multi-Agent Graph with Privacy Agent</title>
  <desc id="desc">LangGraph flow from start to analyze_law, check_routing, parallel tax compliance privacy specialists, aggregate, and end.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .startend { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; }
      .router { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
      .specialist { fill: #f2f0ff; stroke: #6d28d9; stroke-width: 2; rx: 8; }
      .aggregate { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
      .label { fill: #0f172a; font: 600 16px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .small { fill: #475569; font: 13px Arial, sans-serif; text-anchor: middle; }
      .edge { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .conditional { stroke: #7c3aed; stroke-width: 2.2; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow-dashed); }
      .band { fill: #ede9fe; stroke: #c4b5fd; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="620"/>
  <text x="590" y="42" class="label" style="font-size:22px">Stage 4 Multi-Agent Graph</text>
  <text x="590" y="68" class="small">analyze_law -&gt; check_routing -&gt; parallel specialists -&gt; aggregate</text>

  <rect x="60" y="125" width="130" height="58" class="startend" rx="29"/>
  <text x="125" y="154" class="label">START</text>

  <rect x="245" y="118" width="170" height="72" class="node"/>
  <text x="330" y="154" class="label">analyze_law</text>

  <rect x="470" y="118" width="170" height="72" class="router"/>
  <text x="555" y="147" class="label">check_routing</text>
  <text x="555" y="172" class="small">conditional Send()</text>

  <rect x="710" y="96" width="360" height="332" class="band"/>
  <text x="890" y="122" class="small" style="font-weight:700; fill:#5b21b6">Parallel specialist agents</text>

  <rect x="790" y="152" width="200" height="66" class="specialist"/>
  <text x="890" y="185" class="label">tax_agent</text>

  <rect x="790" y="250" width="200" height="66" class="specialist"/>
  <text x="890" y="283" class="label">compliance_agent</text>

  <rect x="790" y="348" width="200" height="66" class="specialist"/>
  <text x="890" y="381" class="label">privacy_agent</text>

  <rect x="470" y="480" width="170" height="72" class="aggregate"/>
  <text x="555" y="516" class="label">aggregate</text>

  <rect x="720" y="487" width="130" height="58" class="startend" rx="29"/>
  <text x="785" y="516" class="label">END</text>

  <path d="M 190 154 L 245 154" class="edge"/>
  <path d="M 415 154 L 470 154" class="edge"/>

  <path d="M 640 150 C 690 130, 735 160, 790 185" class="conditional"/>
  <path d="M 640 154 C 700 180, 730 250, 790 283" class="conditional"/>
  <path d="M 640 160 C 705 230, 720 350, 790 381" class="conditional"/>
  <path d="M 555 190 L 555 480" class="conditional"/>

  <path d="M 790 202 C 700 230, 640 410, 595 480" class="edge"/>
  <path d="M 790 283 C 695 300, 650 425, 600 480" class="edge"/>
  <path d="M 790 381 C 705 392, 650 455, 620 492" class="edge"/>
  <path d="M 640 516 L 720 516" class="edge"/>
</svg>
